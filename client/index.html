<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeAudit — Diagnóstico de seguridad Microsoft 365</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-inner">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="logo-text">Be<span>Audit</span></div>
      </div>
      <div class="loading-spinner"></div>
      <p class="loading-msg">Conectando con Microsoft Graph API…</p>
    </div>
  </div>

  <!-- Error screen -->
  <div id="error" style="display:none">
    <div class="error-inner">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2>Error al cargar el diagnóstico</h2>
      <p id="error-msg">No se pudo conectar con Microsoft Graph API.</p>
      <p class="error-hint">Verifica que la app registration tenga los permisos correctos y que las credenciales del .env sean válidas.</p>
      <button onclick="location.reload()" class="btn-retry">Reintentar</button>
    </div>
  </div>

  <!-- Main app (hidden until loaded) -->
  <div id="app" style="display:none">
    <div class="wrapper">

      <!-- Header -->
      <div id="header"></div>

      <!-- Score bar -->
      <div id="score-section"></div>

      <!-- Content area -->
      <div class="content">

        <!-- KPI metrics row -->
        <div id="metrics-row"></div>

        <!-- Main two-column grid -->
        <div id="main-grid" class="main-grid">
          <div id="risks-col" class="card"></div>
          <div id="services-col" class="right-col"></div>
        </div>

        <!-- Users table -->
        <div id="users-section" class="card"></div>

        <!-- Recommendations -->
        <div id="recommendations"></div>

      </div>

      <!-- Footer -->
      <div id="footer"></div>

    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none">
    <div id="modal-card" class="modal-card">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
